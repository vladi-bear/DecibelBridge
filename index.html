<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>Voice Sensor</title>
</head>


<body>


<script>

// =========================
// 플레이어 이름
// =========================

const params = new URLSearchParams(location.search);

const playerName =
    params.get("player") || "unknown";



// =========================
// WebSocket 서버
// =========================

// 테스트용
const ws = new WebSocket(
    "ws://localhost:3000"
);


ws.onopen = () => {
    console.log("VoiceServer 연결 성공");
};


ws.onerror = (e) => {
    console.log("WebSocket 오류", e);
};


ws.onclose = () => {
    console.log("VoiceServer 연결 종료");
};




// =========================
// 마이크 시작
// =========================

async function startMicrophone(){


    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });



    const audioContext =
        new AudioContext();



    const analyser =
        audioContext.createAnalyser();


    analyser.fftSize = 2048;



    const source =
        audioContext.createMediaStreamSource(stream);



    source.connect(analyser);



    const data =
        new Uint8Array(analyser.fftSize);





    // 0.1초마다 측정

    setInterval(()=>{


        analyser.getByteTimeDomainData(data);



        let sum = 0;



        for(let i = 0; i < data.length; i++){


            const value =
                (data[i] - 128) / 128;


            sum += value * value;

        }



        const rms =
            Math.sqrt(sum / data.length);



        // dBFS 계산

        let dbfs =
            20 * Math.log10(rms);



        if(!isFinite(dbfs)){
            dbfs = -80;
        }



        /*
            게임용 dB 변환

            -80 dBFS → 20
            -60 dBFS → 40
            -40 dBFS → 60
            -20 dBFS → 80
              0 dBFS → 100
        */


        let gameDb =
            dbfs + 100;



        // 0~100 제한

        gameDb =
            Math.max(
                0,
                Math.min(
                    100,
                    gameDb
                )
            );



        gameDb =
            Number(gameDb.toFixed(1));





        // 서버 전송

        if(ws.readyState === WebSocket.OPEN){


            ws.send(JSON.stringify({

                player: playerName,

                db: gameDb

            }));


        }



    },100);


}





startMicrophone();


</script>


</body>

</html>
