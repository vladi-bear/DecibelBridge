<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>DecibelBridge</title>
<style>
body {
    margin: 0;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: rgba(17,24,39,0.85);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 400px;
    backdrop-filter: blur(5px);
}
#db {
    font-size: 70px;
    color: #22c55e;
    font-weight: bold;
    margin: 20px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎤 DecibelBridge</h1>
    <div id="player"></div>
    <div id="db">0.0dB</div>
    <div id="status">마이크 권한을 요청할게요. 절대 녹음하지 않고 dB(데시벨)만 측정합니다!</div>
</div>

<script>

const SERVER_URL = "wss://skins-reggae-consequences-requirements.trycloudflare.com";
const NOISE_GATE = 48.5;

const params = new URLSearchParams(location.search);
const playerName = params.get("player") || "unknown";

document.getElementById("player").textContent =
    "플레이어: " + playerName;

const socket = new WebSocket(SERVER_URL);

socket.onopen = () => {
    document.getElementById("status").textContent = "서버 연결 완료";
    console.log("DecibelBridge WebSocket 연결 성공");
};

socket.onerror = (error) => {
    document.getElementById("status").textContent = "서버 연결 실패";
    console.error("WebSocket 오류", error);
};

socket.onclose = () => {
    console.log("DecibelBridge 연결 종료");
};

async function startMicrophone() {

    try {

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        document.getElementById("status").textContent =
            "마이크 연결 완료";

        const audioContext = new AudioContext();
        const analyser = audioContext.createAnalyser();

        analyser.fftSize = 2048;

        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);

        const data = new Uint8Array(analyser.fftSize);
        const dbHistory = [];

        setInterval(() => {

            analyser.getByteTimeDomainData(data);

            let sum = 0;

            for (let i = 0; i < data.length; i++) {

                const value = (data[i] - 128) / 128;
                sum += value * value;

            }

            let db = 20 * Math.log10(
                Math.sqrt(sum / data.length)
            );

            if (!Number.isFinite(db)) {
                db = -80;
            }

            let gameDb = (db + 80) * 1.25;

            if (gameDb < NOISE_GATE) {

                gameDb = 0;

            } else {

                gameDb =
                    ((gameDb - NOISE_GATE) /
                    (100 - NOISE_GATE)) * 100;

            }

            gameDb = Math.max(0, Math.min(100, gameDb));

            dbHistory.push(gameDb);

            if (dbHistory.length > 5) {
                dbHistory.shift();
            }

            let averageDb = 0;

            for (const value of dbHistory) {
                averageDb += value;
            }

            averageDb /= dbHistory.length;

            const displayDb = averageDb.toFixed(1);

            const dbElement = document.getElementById("db");

            dbElement.textContent =
                displayDb + "dB";

            if (averageDb < 30) {

                dbElement.style.color = "#22c55e";

            } else if (averageDb < 60) {

                dbElement.style.color = "#eab308";

            } else if (averageDb < 80) {

                dbElement.style.color = "#f97316";

            } else {

                dbElement.style.color = "#ef4444";

            }

            if (socket.readyState === WebSocket.OPEN) {

                socket.send(JSON.stringify({
                    player: playerName,
                    db: Number(displayDb)
                }));

            }

        }, 100);

    } catch (error) {

        console.error(error);

        document.getElementById("status").textContent =
            "마이크 권한을 허용해주세요.";

    }

}

startMicrophone();

</script>

</body>
</html>
