<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VoiceDB</title>
<style>
body{
	margin:0;
	background-image:url("background.jpg");
	background-size:cover;
	background-position:center;
	background-repeat:no-repeat;
	color:white;
	font-family:sans-serif;
	display:flex;
	justify-content:center;
	align-items:center;
	height:100vh;
}
.card{
	background:rgba(17,24,39,0.85);
	padding:40px;
	border-radius:20px;
	text-align:center;
	width:400px;
	backdrop-filter:blur(5px);
}
#db{
	font-size:70px;
	color:#22c55e;
	font-weight:bold;
	margin:20px;
}
</style>
</head>
<body>
<div class="card">
<h1>🎤 VoiceDB</h1>
<div id="player"></div>
<div id="db">0</div>
<div id="status">마이크 권한 요청 중...</div>
</div>

<script>
const SERVER_URL="wss://skins-reggae-consequences-requirements.trycloudflare.com";

const params=new URLSearchParams(location.search);
const playerName=params.get("player")||"unknown";

document.getElementById("player").textContent="플레이어: "+playerName;

const socket=new WebSocket(SERVER_URL);

socket.onopen=()=>{
	document.getElementById("status").textContent="서버 연결 완료";
	console.log("WebSocket 연결 성공");
};

socket.onerror=(e)=>{
	document.getElementById("status").textContent="서버 연결 실패";
	console.error("WebSocket 오류",e);
};

socket.onclose=()=>{
	console.log("WebSocket 종료");
};

async function startMicrophone(){

	try{

		const stream=await navigator.mediaDevices.getUserMedia({
			audio:true
		});

		document.getElementById("status").textContent="마이크 연결 완료";

		const audioContext=new AudioContext();
		const analyser=audioContext.createAnalyser();

		analyser.fftSize=2048;

		const source=audioContext.createMediaStreamSource(stream);
		source.connect(analyser);

		const data=new Uint8Array(analyser.fftSize);

		setInterval(()=>{

			analyser.getByteTimeDomainData(data);

			let sum=0;

			for(let i=0;i<data.length;i++){

				let value=(data[i]-128)/128;
				sum+=value*value;

			}

			let rms=Math.sqrt(sum/data.length);

			let db=20*Math.log10(rms);

			if(!isFinite(db)){
				db=-80;
			}

			let volume=((db+80)/80)*100;

			if(volume<0){
				volume=0;
			}

			if(volume>100){
				volume=100;
			}

			volume=Math.round(volume);

			document.getElementById("db").textContent=volume;

			if(socket.readyState===WebSocket.OPEN){

				socket.send(JSON.stringify({
					player:playerName,
					db:volume
				}));

			}

		},100);

	}catch(e){

		console.error(e);

		document.getElementById("status").textContent="마이크 권한을 허용해주세요.";

	}

}

startMicrophone();
</script>
</body>
</html>
