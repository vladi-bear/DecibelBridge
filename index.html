<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Voice Sensor</title>
<style>
body{
    background:#111827;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding-top:100px;
}
#db{
    font-size:80px;
    font-weight:bold;
    color:#22c55e;
}
button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}
#status{
    color:#cbd5e1;
}
</style>
</head>

<body>

<h1>🎤 Voice Sensor</h1>
<h2 id="player"></h2>

<div id="notice">
    <h3>마이크 권한 필요</h3>
    <p>
        오로지 마이크 데시벨 측정을 위한 용도입니다.<br>
        음성 녹음 및 저장은 하지 않습니다.
    </p>
    <button onclick="startMicrophone()">마이크 허용</button>
</div>

<div id="db">-- dB</div>
<div id="status"></div>


<script>
const params=new URLSearchParams(location.search);
const playerName=params.get("player")||"unknown";

document.getElementById("player").textContent=playerName;


const ws=new WebSocket("ws://localhost:3000");

ws.onopen=()=>{
    console.log("VoiceServer 연결 성공");
};

ws.onerror=(e)=>{
    console.log("WebSocket 오류",e);
};


async function startMicrophone(){

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            audio:true
        });


        document.getElementById("notice").style.display="none";
        document.getElementById("status").textContent="마이크 연결 완료";


        const audioContext=new AudioContext();
        const analyser=audioContext.createAnalyser();

        analyser.fftSize=2048;


        const source=audioContext.createMediaStreamSource(stream);
        source.connect(analyser);


        const data=new Uint8Array(analyser.fftSize);


        setInterval(()=>{

            analyser.getByteTimeDomainData(data);


            let sum=0;

            for(let i=0;i<data.length;i++){

                const value=(data[i]-128)/128;
                sum+=value*value;

            }


            const rms=Math.sqrt(sum/data.length);


            let dbfs=20*Math.log10(rms);

            if(!isFinite(dbfs)){
                dbfs=-80;
            }


            let gameDb=dbfs+100;

            gameDb=Math.max(0,Math.min(100,gameDb));

            gameDb=Number(gameDb.toFixed(1));


            document.getElementById("db").textContent=
                gameDb+" dB";


            if(ws.readyState===WebSocket.OPEN){

                ws.send(JSON.stringify({
                    player:playerName,
                    db:gameDb
                }));

            }


        },100);


    }catch(err){

        console.error(err);

        document.getElementById("status").textContent=
            "마이크 권한이 필요합니다.";

    }

}

</script>

</body>
</html>
