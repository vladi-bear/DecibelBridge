<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VoiceDB</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#111;color:white;font-family:sans-serif;text-align:center;margin-top:100px}
#db{font-size:72px;color:#00ff88}
</style>
</head>
<body>

<h1>🎤 VoiceDB</h1>
<div id="player"></div>
<div id="db">-- dB</div>

<script>
const params = new URLSearchParams(location.search);
const player = params.get('player') || 'unknown';

document.getElementById('player').textContent =
  '플레이어: ' + player;

// 여기엔 supabase 변수를 선언하지 않는다
const client = window.supabase.createClient(
  'https://uwzerhiqdaqhtncyghoy.supabase.co',
  'sb_publishable_jxfgCwlcynf35U1bkIxipw_Kxayi39_'
);

async function start() {

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: true
  });

  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;

  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.fftSize);

  setInterval(async () => {

    analyser.getByteTimeDomainData(data);

    let sum = 0;

    for (let i = 0; i < data.length; i++) {
      const v = (data[i] - 128) / 128;
      sum += v * v;
    }

    const rms = Math.sqrt(sum / data.length);

    let db = 20 * Math.log10(rms);

    if (!isFinite(db)) db = -80;

    db = Number(db.toFixed(1));

    document.getElementById('db').textContent =
      db + ' dB';

    await client
      .from('voiceInfo')
      .insert({
        name: player,
        db: db
      });

  }, 100);
}

start().catch(console.error);
</script>

</body>
</html>
