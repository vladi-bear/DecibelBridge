<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceDB</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#111827;
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:500px;
}
#db{
  font-size:72px;
  font-weight:bold;
  color:#22c55e;
  margin:20px 0;
}
#status{
  color:#cbd5e1;
}
</style>

</head>
<body>

<div class="card">
  <h1>🎤 VoiceDB</h1>

  <div id="player">플레이어: 로딩중...</div>

  <div id="db">-- dB</div>

  <div id="status">마이크 권한을 요청하는 중...</div>
</div>

<script>
// 플레이어 이름 읽기
const params = new URLSearchParams(location.search);
const playerName = params.get('player') || 'unknown';

document.getElementById('player').textContent =
  '플레이어: ' + playerName;

// Supabase 클라이언트 생성
const sbClient = window.supabase.createClient(
  'https://uwzerhiqdaqhtncyghoy.supabase.co',
  'sb_publishable_jxfgCwlcynf35U1bkIxipw_Kxayi39_'
);

// 마이크 시작
async function startMicrophone() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    document.getElementById('status').textContent =
      '마이크 연결 완료';

    const audioContext = new AudioContext();
    const analyser = audioContext.createAnalyser();

    analyser.fftSize = 2048;

    const source =
      audioContext.createMediaStreamSource(stream);

    source.connect(analyser);

    const data = new Uint8Array(analyser.fftSize);

    // 100ms마다 측정
    setInterval(async () => {

      analyser.getByteTimeDomainData(data);

      let sum = 0;

      for (let i = 0; i < data.length; i++) {
        const value = (data[i] - 128) / 128;
        sum += value * value;
      }

      const rms = Math.sqrt(sum / data.length);

      let db = 20 * Math.log10(rms);

      if (!isFinite(db)) {
        db = -80;
      }

      db = Number(db.toFixed(1));

      // 화면 표시
      document.getElementById('db').textContent =
        db + ' dB';

      // Supabase 저장
      const { error } = await sbClient
        .from('voiceInfo')
        .insert({
          name: playerName,
          db: db
        });

      if (error) {
        console.error('Supabase 오류:', error);
      }

    }, 100);

  } catch (err) {

    console.error(err);

    document.getElementById('status').textContent =
      '마이크 권한을 허용해주세요.';
  }
}

startMicrophone();
</script>

</body>
</html>
